CONFIG_ZMK_KEYBOARD_NAME="roBa"

# --- 画像から反映：スタックサイズの拡張 (処理落ち・フリーズ対策) ---
CONFIG_ZMK_BLE_THREAD_STACK_SIZE=4096
CONFIG_ZMK_LOW_PRIORITY_THREAD_STACK_SIZE=4096
CONFIG_INPUT_THREAD_STACK_SIZE=4096
CONFIG_ZMK_SPLIT_BLE_CENTRAL_SPLIT_RUN_STACK_SIZE=4096

# --- 画像から反映：通信安定化の詳細設定 ---
# 2M PHYを無効化し、1M PHYに固定することで通信距離と安定性を向上
CONFIG_BT_CTLR_PHY_2M=n

# 接続インターバルを9（11.25ms）に固定し、通信のゆらぎを抑える
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=9
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=9

# Bluetoothスレッドの優先度を上げ、入力遅延や切断を防止
CONFIG_ZMK_BLE_THREAD_PRIORITY=3

# --- 接続安定化 (基本) ---
# 右側（セントラル）でのPC接続安定化を有効
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y
# 送信出力を最大(+8dBm)に設定
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# --- スリープ設定 ---
# 切断を防ぐためスリープは無効
CONFIG_ZMK_SLEEP=n
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1800000

# --- 基本機能 (マウス・ポインティング) ---
CONFIG_ZMK_MOUSE=y
CONFIG_ZMK_POINTING=y
CONFIG_NFCT_PINS_AS_GPIOS=y
CONFIG_SPI=y
CONFIG_INPUT=y

# --- バッテリー報告 (右側に集約) ---
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y

# --- ZMK Studio ---
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n
