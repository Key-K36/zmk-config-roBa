CONFIG_ZMK_KEYBOARD_NAME="roBa"

# --- [修正] マウスのデータ量を抑える設定 ---
# ZMK Pointingの標準的な更新間隔調整（値を大きくすると負荷が減ります）
CONFIG_ZMK_POINTING_SMOOTH_SCROLLING=n

# --- スタックサイズ (維持) ---
CONFIG_ZMK_BLE_THREAD_STACK_SIZE=4096
CONFIG_ZMK_LOW_PRIORITY_THREAD_STACK_SIZE=4096
CONFIG_INPUT_THREAD_STACK_SIZE=4096
CONFIG_ZMK_SPLIT_BLE_CENTRAL_SPLIT_RUN_STACK_SIZE=4096

# --- 通信安定化 (より堅実な設定) ---
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=n
CONFIG_BT_CTLR_PHY_2M=n
CONFIG_BT_CTLR_TX_PWR_0=y
CONFIG_ZMK_BLE_THREAD_PRIORITY=3

# 接続パラメータ
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=12
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=24
CONFIG_BT_PERIPHERAL_PREF_LATENCY=0
CONFIG_BT_PERIPHERAL_PREF_TIMEOUT=400

# --- 左右間の同期強化 ---
CONFIG_BT_MAX_CONN=5
CONFIG_BT_MAX_PAIRED=5

# --- 基本機能 (高負荷なStudioを一旦オフ) ---
CONFIG_ZMK_SLEEP=n
CONFIG_ZMK_MOUSE=y
CONFIG_ZMK_POINTING=y
CONFIG_NFCT_PINS_AS_GPIOS=y
CONFIG_SPI=y
CONFIG_INPUT=y
CONFIG_ZMK_STUDIO=n

# --- LED関連の無効化 (エラー対策のため記述を整理) ---
CONFIG_ZMK_RGB_UNDERGLOW=n
CONFIG_ZMK_BACKLIGHT=n

# バッテリー報告
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
