CONFIG_ZMK_KEYBOARD_NAME="roBa"

# --- 左右間の通信安定化 (右手側と設定を合わせる) ---
# スタックサイズの拡張：左右間のデータ転送エラーを防止
CONFIG_ZMK_BLE_THREAD_STACK_SIZE=4096
CONFIG_ZMK_LOW_PRIORITY_THREAD_STACK_SIZE=4096
CONFIG_INPUT_THREAD_STACK_SIZE=4096

# 通信の安定化：2M PHYを無効化し、右手側との同期を確実にする
CONFIG_BT_CTLR_PHY_2M=n

# 送信出力の向上：右手（セントラル）への電波を強くする
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Bluetoothスレッドの優先度を上げ、処理優先順位を最適化
CONFIG_ZMK_BLE_THREAD_PRIORITY=3

# --- 基本機能 ---
CONFIG_ZMK_MOUSE=y
CONFIG_ZMK_POINTING=y
CONFIG_NFCT_PINS_AS_GPIOS=y
CONFIG_ZMK_BLE=y

# --- バッテリー報告 ---
# ペリフェラル側も個別の残量報告を有効にする
CONFIG_ZMK_BATTERY_REPORTING=y

# --- ZMK Studio ---
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n
